services:
  - type: web
    name: cybershield-backend
    env: python
    region: oregon
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cybershield-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: cybershield-db
    region: oregon
    plan: free
